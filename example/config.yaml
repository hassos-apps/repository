# Home Assistant App configuration
# Docs: https://developers.home-assistant.io/docs/apps/configuration
name: "Example"
version: "1.0.0"
slug: "example"
description: "Example app for the HassOS Apps ecosystem"
url: "https://github.com/hassos-apps/app-example"
arch:
  - amd64
  - aarch64
image: "ghcr.io/hassos-apps/example-{arch}"
init: false
startup: application
boot: auto
ingress: false
homeassistant_api: false
auth_api: false
map:
  - type: ssl
    read_only: true
backup: hot
options:
  log_level: info
  seconds_between_quotes: 300
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  seconds_between_quotes: int(10,3600)
