# Home Assistant App configuration
# Docs: https://developers.home-assistant.io/docs/apps/configuration
name: "Shelly Manager"
version: "1.0.0"
slug: "shelly-manager"
description: "Local management for Shelly IoT devices without cloud connectivity."
url: "https://github.com/hassos-apps/app-shelly-manager"
arch:
  - amd64
  - aarch64
image: "ghcr.io/hassos-apps/shelly-manager-{arch}"
init: false
startup: application
boot: auto
ingress: false
homeassistant_api: false
auth_api: false
map:
  - type: ssl
    read_only: true
backup: hot
options:
  log_level: info
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
