---
name: Sync All Apps

on:
  workflow_dispatch:
    inputs:
      app:
        description: "App slug to sync (leave empty for all)"
        required: false
        type: string

concurrency:
  group: repository-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync app files from source repos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync app files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Define all apps and their source repos
          declare -A APPS=(
            ["example"]="hassos-apps/app-example"
          )

          input_app="${{ inputs.app }}"

          for slug in "${!APPS[@]}"; do
            if [[ -n "$input_app" && "$slug" != "$input_app" ]]; then
              continue
            fi

            repo="${APPS[$slug]}"
            echo "::group::Syncing ${slug} from ${repo}"

            # Clone app repo (shallow)
            gh repo clone "${repo}" "_app_src" -- --depth 1 2>/dev/null

            src="_app_src/${slug}"
            dst="${slug}"
            mkdir -p "${dst}"

            # Sync all HA-required files from slug directory
            for f in config.yaml build.yaml DOCS.md CHANGELOG.md icon.png logo.png apparmor.txt; do
              if [ -f "${src}/${f}" ]; then
                cp "${src}/${f}" "${dst}/${f}"
                echo "  ✓ ${f}"
              else
                echo "  ⊘ ${f} (not found)"
              fi
            done

            # Sync translations directory
            if [ -d "${src}/translations" ]; then
              rm -rf "${dst}/translations"
              cp -r "${src}/translations" "${dst}/translations"
              echo "  ✓ translations/"
            fi

            # Copy README from repo root (not slug directory)
            if [ -f "_app_src/README.md" ]; then
              cp "_app_src/README.md" "${dst}/README.md"
              echo "  ✓ README.md (from repo root)"
            fi

            rm -rf _app_src
            echo "::endgroup::"
          done

      - name: Regenerate README app table
        run: |
          # Build the app table from synced config.yaml files
          table="| App | Description | Version | Architectures |\n"
          table+="|-----|-------------|---------|---------------|\n"

          for dir in */; do
            slug="${dir%/}"
            config="${slug}/config.yaml"

            # Skip non-app directories
            [ -f "${config}" ] || continue

            name=$(yq e '.name' "${config}")
            desc=$(yq e '.description' "${config}")
            version=$(yq e '.version' "${config}")
            archs=$(yq e '.arch | join(", ")' "${config}")
            url=$(yq e '.url' "${config}")

            table+="| [${name}](${url}) | ${desc} | ${version} | ${archs} |\n"
          done

          # Replace the table in README.md between markers
          # Use awk to replace the section between "## Available Apps" and the next "##"
          awk -v table="$(echo -e "${table}")" '
            /^## Available Apps/ {
              print
              print ""
              print table
              skip = 1
              next
            }
            /^## / && skip {
              skip = 0
            }
            !skip { print }
          ' README.md > README.tmp
          mv README.tmp README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync app files from source repos"
            git push
          fi
