---
name: Repository Update

on:
  repository_dispatch:
    types: [update]

concurrency:
  group: repository-update
  cancel-in-progress: false

jobs:
  update:
    name: Update addon "${{ github.event.client_payload.addon }}"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout addon repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repository }}
          path: _addon_src
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy addon files to index
        run: |
          addon="${{ github.event.client_payload.addon }}"
          src="_addon_src/${addon}"
          dst="${addon}"

          mkdir -p "${dst}"

          # Copy config and assets
          for f in config.yaml build.yaml icon.png logo.png DOCS.md; do
            if [ -f "${src}/${f}" ]; then
              cp "${src}/${f}" "${dst}/${f}"
              echo "Copied ${f}"
            fi
          done

          rm -rf _addon_src

      - name: Commit and push
        run: |
          addon="${{ github.event.client_payload.addon }}"
          version="${{ github.event.client_payload.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${addon}/"
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ${addon} to ${version}"
            git push
          fi
