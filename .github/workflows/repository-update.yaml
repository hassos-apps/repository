---
name: Repository Update

on:
  repository_dispatch:
    types: [update]

concurrency:
  group: repository-update
  cancel-in-progress: false

jobs:
  update:
    name: Update app "${{ github.event.client_payload.addon }}"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repository }}
          path: _app_src
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy app files to index
        run: |
          app="${{ github.event.client_payload.addon }}"
          src="_app_src/${app}"
          dst="${app}"

          mkdir -p "${dst}"

          # Copy config and assets
          for f in config.yaml build.yaml icon.png logo.png DOCS.md CHANGELOG.md; do
            if [ -f "${src}/${f}" ]; then
              cp "${src}/${f}" "${dst}/${f}"
              echo "Copied ${f}"
            fi
          done

          rm -rf _app_src

      - name: Commit and push
        run: |
          app="${{ github.event.client_payload.addon }}"
          version="${{ github.event.client_payload.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${app}/"
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ${app} to ${version}"
            git push
          fi
