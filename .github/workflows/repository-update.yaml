---
name: Repository Update

on:
  repository_dispatch:
    types: [update]

concurrency:
  group: repository-update
  cancel-in-progress: false

jobs:
  update:
    name: Update app "${{ github.event.client_payload.addon }}"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repository }}
          path: _app_src
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync app files to index
        run: |
          app="${{ github.event.client_payload.addon }}"
          src="_app_src/${app}"
          dst="${app}"

          mkdir -p "${dst}"

          # Sync all HA-required files
          for f in config.yaml build.yaml DOCS.md CHANGELOG.md icon.png logo.png apparmor.txt; do
            if [ -f "${src}/${f}" ]; then
              cp "${src}/${f}" "${dst}/${f}"
              echo "Synced ${f}"
            fi
          done

          # Sync translations directory
          if [ -d "${src}/translations" ]; then
            rm -rf "${dst}/translations"
            cp -r "${src}/translations" "${dst}/translations"
            echo "Synced translations/"
          fi

          # Copy app README from repo root (not slug dir)
          if [ -f "_app_src/README.md" ]; then
            cp "_app_src/README.md" "${dst}/README.md"
            echo "Synced README.md"
          fi

          rm -rf _app_src

      - name: Regenerate README app table
        run: |
          # Build the app table from synced config.yaml files
          table="| App | Description | Version | Architectures |\n"
          table+="|-----|-------------|---------|---------------|\n"

          for dir in */; do
            slug="${dir%/}"
            config="${slug}/config.yaml"

            # Skip non-app directories
            [ -f "${config}" ] || continue

            name=$(yq e '.name' "${config}")
            desc=$(yq e '.description' "${config}")
            version=$(yq e '.version' "${config}")
            archs=$(yq e '.arch | join(", ")' "${config}")
            url=$(yq e '.url' "${config}")

            table+="| [${name}](${url}) | ${desc} | ${version} | ${archs} |\n"
          done

          # Replace the table in README.md between markers
          awk -v table="$(echo -e "${table}")" '
            /^## Available Apps/ {
              print
              print ""
              print table
              skip = 1
              next
            }
            /^## / && skip {
              skip = 0
            }
            !skip { print }
          ' README.md > README.tmp
          mv README.tmp README.md

      - name: Commit and push
        run: |
          app="${{ github.event.client_payload.addon }}"
          version="${{ github.event.client_payload.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ${app} to ${version}"
            git push
          fi
