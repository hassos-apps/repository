# Home Assistant App configuration
# Docs: https://developers.home-assistant.io/docs/apps/configuration
name: "Homebox"
version: "0.24.8"
slug: "homebox"
description: "Inventory and organization system for the Home User"
url: "https://github.com/hassos-apps/app-homebox"
arch:
  - amd64
  - aarch64
image: "ghcr.io/hassos-apps/homebox-{arch}"
init: false
startup: application
boot: auto
ingress: false
homeassistant_api: false
auth_api: false
ports:
  7745/tcp: 7745
ports_description:
  7745/tcp: "Homebox Web UI"
host_network: false
map:
  - type: ssl
    read_only: true
backup: hot
options:
  log_level: info
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
